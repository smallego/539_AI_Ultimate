{% extends "base.html" %}

{% block content %}
<section class="panel">
  <div class="panel-title">
    <h2>Strategy Backtest Center</h2>
    <div class="d-flex gap-2 align-items-center">
      <span id="backtest-center-status" class="badge text-bg-light">Loading</span>
      <button class="btn btn-primary btn-sm" data-action="/api/backtest">Run Backtest</button>
      <button class="btn btn-outline-primary btn-sm" data-action="/api/run-all">Run All</button>
    </div>
  </div>
  <div class="row g-3 mb-4">
    <div class="col-6 col-xl-2"><div class="mini-metric"><span>Total Periods</span><strong id="bt-total-periods">0</strong></div></div>
    <div class="col-6 col-xl-2"><div class="mini-metric"><span>Cumulative ROI</span><strong id="bt-cumulative-roi">-</strong></div></div>
    <div class="col-6 col-xl-2"><div class="mini-metric"><span>Hit 2+</span><strong id="bt-hit2">-</strong></div></div>
    <div class="col-6 col-xl-2"><div class="mini-metric"><span>Hit 3+</span><strong id="bt-hit3">-</strong></div></div>
    <div class="col-6 col-xl-2"><div class="mini-metric"><span>Avg Match</span><strong id="bt-avg-match">-</strong></div></div>
    <div class="col-6 col-xl-2"><div class="mini-metric"><span>Losing Streak</span><strong id="bt-losing-streak">-</strong></div></div>
  </div>
  <div class="row g-4 mb-4">
    <div class="col-12 col-xl-5"><canvas id="bt-roi-chart" height="180"></canvas></div>
    <div class="col-12 col-xl-4"><canvas id="bt-hit-chart" height="180"></canvas></div>
    <div class="col-12 col-xl-3"><canvas id="bt-match-chart" height="180"></canvas></div>
  </div>
  <div class="table-responsive backtest-table-wrap">
    <table class="table table-sm align-middle mb-0">
      <thead><tr><th>Date</th><th>Draw</th><th class="text-end">Best</th><th class="text-end">Period ROI</th><th class="text-end">Cumulative ROI</th><th>Winning</th></tr></thead>
      <tbody id="bt-recent-rows"><tr><td colspan="6" class="text-muted">Loading...</td></tr></tbody>
    </table>
  </div>
  <pre id="output" class="mt-4">Ready.</pre>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/backtest.js"></script>
{% endblock %}
