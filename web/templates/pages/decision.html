{% extends "base.html" %}

{% block content %}
<section class="panel decision-card">
  <div class="panel-title"><h2>Decision Center</h2><span id="decision-recommendation" class="badge text-bg-primary">Loading</span></div>
  <div class="row g-4 align-items-center">
    <div class="col-12 col-xl-3">
      <div class="decision-score">
        <div id="decision-stars" class="decision-stars">-----</div>
        <strong id="decision-score">0</strong>
        <span>Decision Score</span>
      </div>
    </div>
    <div class="col-6 col-xl-2"><div class="mini-metric"><span>Confidence</span><strong id="decision-confidence">-</strong></div></div>
    <div class="col-6 col-xl-2"><div class="mini-metric"><span>Risk</span><strong id="decision-risk">-</strong></div></div>
    <div class="col-12 col-xl-5"><div id="decision-reasons" class="decision-reasons"></div></div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/decision.js"></script>
{% endblock %}
