{% extends "base.html" %}

{% block content %}
<section class="row g-4">
  <div class="col-12 col-xl-4">
    <div class="panel h-100">
      <div class="panel-title"><h2 data-i18n="label.latestDrawPanel">Latest Draw</h2><span id="data-status" class="badge text-bg-light" data-i18n="status.loading">Loading</span></div>
      <div class="latest-draw">
        <span data-i18n="label.drawNo">Draw No.</span>
        <strong id="data-latest-draw-no">-</strong>
        <small id="data-latest-draw-date">-</small>
        <div id="data-latest-draw-numbers" class="number-line">-</div>
      </div>
      <div class="row g-3">
        <div class="col-6"><div class="mini-metric"><span data-i18n="label.totalDraws">Total Draws</span><strong id="data-database-count">0</strong></div></div>
        <div class="col-6"><div class="mini-metric"><span data-i18n="label.window">Window</span><strong id="data-window-count">0</strong></div></div>
      </div>
    </div>
  </div>
  <div class="col-12 col-xl-8">
    <div class="panel chart-panel">
      <div class="panel-title"><h2 data-i18n="label.sumSpanTrend">Sum / Span Trend</h2><span class="text-muted small" data-i18n="label.recent100">Recent 100 draws</span></div>
      <canvas id="data-trend-chart" height="150"></canvas>
    </div>
  </div>
  <div class="col-12 col-xl-6">
    <div class="panel chart-panel"><div class="panel-title"><h2 data-i18n="label.hotNumbers">Hot Numbers</h2></div><canvas id="data-hot-chart" height="160"></canvas></div>
  </div>
  <div class="col-12 col-xl-6">
    <div class="panel chart-panel"><div class="panel-title"><h2 data-i18n="label.coldNumbers">Cold Numbers</h2></div><canvas id="data-cold-chart" height="160"></canvas></div>
  </div>
  <div class="col-12 col-xl-6">
    <div class="panel chart-panel"><div class="panel-title"><h2 data-i18n="label.oddEvenRatio">Odd / Even Ratio</h2></div><canvas id="data-odd-even-chart" height="170"></canvas></div>
  </div>
  <div class="col-12 col-xl-6">
    <div class="panel chart-panel"><div class="panel-title"><h2 data-i18n="label.lowHighRatio">Low / High Ratio</h2></div><canvas id="data-low-high-chart" height="170"></canvas></div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/data.js"></script>
{% endblock %}
